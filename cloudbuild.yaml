substitutions:
  _SERVICE_NAME: morph-prompt
  _REGION: us-central1
  _MODEL: gemini-3-flash-preview
  _AI_PROVIDER: vertex_ai
  _GEMINI_SECRET: gemini-api-key

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/morph-prompt-repo/morph-prompt:$BUILD_ID
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/morph-prompt-repo/morph-prompt:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/morph-prompt-repo/morph-prompt:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - AI_PROVIDER=${_AI_PROVIDER},GEMINI_MODEL=${_MODEL},VERTEX_PROJECT_ID=$PROJECT_ID,VERTEX_LOCATION=${_REGION},SELF_CACHE_ENABLED=true
      - --set-secrets
      - GEMINI_API_KEY=${_GEMINI_SECRET}:latest
